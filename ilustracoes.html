  <div class="ilu-modal" id="iluModal">
    <div class="ilu-modal__backdrop" id="iluBackdrop"></div>
    <button class="ilu-modal__close" id="iluClose" type="button" aria-label="Fechar">

  <script>
    // Language Toggle
    let currentLang = 'pt';
    const langToggle = document.getElementById('langToggle');
    if (langToggle) {
      langToggle.addEventListener('click', () => {
        currentLang = currentLang === 'pt' ? 'en' : 'pt';
        document.querySelectorAll('[data-pt][data-en]').forEach((el) => {
          el.innerHTML = el.dataset[currentLang];
        });
        document.querySelectorAll('.header__lang-opt').forEach((opt) => {
          opt.classList.toggle('header__lang-opt--active', opt.dataset.lang === currentLang);
        });
        document.documentElement.lang = currentLang === 'pt' ? 'pt-BR' : 'en';
      });
    }

    // Ilustração Modal + Zoom + Drag
    (function () {
      var modal = document.getElementById('iluModal');
      var backdrop = document.getElementById('iluBackdrop');
      var closeBtn = document.getElementById('iluClose');
      var img = document.getElementById('iluImg');
      var zoomIn = document.getElementById('iluZoomIn');
      var zoomOut = document.getElementById('iluZoomOut');
      var resetBtn = document.getElementById('iluReset');
      if (!modal || !img) return;

      var scale = 1;
      var dragX = 0, dragY = 0;
      var startX = 0, startY = 0;
      var isDragging = false;

      function updateTransform() {
        img.style.transform = 'scale(' + scale + ') translate(' + dragX + 'px, ' + dragY + 'px)';
      }

      function openModal(src, alt) {
        scale = 1; dragX = 0; dragY = 0;
        img.src = src;
        img.alt = alt || '';
        updateTransform();
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        modal.classList.remove('open');
        document.body.style.overflow = '';
      }

      document.querySelectorAll('.gallery .ilustracoes__img').forEach(function (image) {
        image.addEventListener('click', function () {
          openModal(image.src, image.alt);
        });
      });

      closeBtn.addEventListener('click', closeModal);
      backdrop.addEventListener('click', closeModal);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
      });

      zoomIn.addEventListener('click', function (e) {
        e.stopPropagation();
        if (scale < 3) { scale = Math.min(scale + 0.5, 3); updateTransform(); }
      });

      zoomOut.addEventListener('click', function (e) {
        e.stopPropagation();
        if (scale > 1) { scale = Math.max(scale - 0.5, 1); updateTransform(); }
        if (scale === 1) { dragX = 0; dragY = 0; updateTransform(); }
      });

      resetBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        scale = 1; dragX = 0; dragY = 0; updateTransform();
      });

      img.addEventListener('mousedown', function (e) {
        if (scale <= 1) return;
        e.preventDefault();
        isDragging = true;
        startX = e.clientX - dragX;
        startY = e.clientY - dragY;
        img.classList.add('dragging');
      });

      document.addEventListener('mousemove', function (e) {
        if (!isDragging) return;
        dragX = e.clientX - startX;
        dragY = e.clientY - startY;
        updateTransform();
      });

      document.addEventListener('mouseup', function () {
        if (isDragging) {
          isDragging = false;
          img.classList.remove('dragging');
        }
      });
    })();


  </script>
